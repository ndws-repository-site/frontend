name: Deploy

on:
    push:
        branches: ["main"]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - name: Validate required secrets
              env:
                  NEXT_PUBLIC_SITE_API_ORIGIN: ${{ secrets.NEXT_PUBLIC_SITE_API_ORIGIN }}
                  NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
              run: |
                  if [ -z "$NEXT_PUBLIC_SITE_API_ORIGIN" ]; then
                    echo "NEXT_PUBLIC_SITE_API_ORIGIN is not set"
                    exit 1
                  fi
                  if [ -z "$NEXT_PUBLIC_RECAPTCHA_SITE_KEY" ]; then
                    echo "NEXT_PUBLIC_RECAPTCHA_SITE_KEY is not set"
                    exit 1
                  fi
            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                  build-args: |
                      NEXT_PUBLIC_SITE_API_ORIGIN=${{ secrets.NEXT_PUBLIC_SITE_API_ORIGIN }}
                      NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        env:
            GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            GITHUB_ACTOR: ${{ github.actor }}
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.repository }}
            FRONTEND_IMAGE: ghcr.io/${{ github.repository }}
            NEXT_PUBLIC_SITE_API_ORIGIN: ${{ secrets.NEXT_PUBLIC_SITE_API_ORIGIN }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
            RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
        steps:
            - uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  envs: GHCR_TOKEN,GITHUB_ACTOR,REGISTRY,IMAGE_NAME,FRONTEND_IMAGE,NEXT_PUBLIC_SITE_API_ORIGIN,NEXT_PUBLIC_RECAPTCHA_SITE_KEY,RECAPTCHA_SECRET_KEY
                  script: |
                      set -euo pipefail
                      cd /opt/app

                      {
                          echo "NODE_ENV=production"
                          echo "NEXT_PUBLIC_SITE_API_ORIGIN=${NEXT_PUBLIC_SITE_API_ORIGIN}"
                          echo "NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}"
                          echo "RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}"
                      } > .env.client

                      export REGISTRY IMAGE_NAME FRONTEND_IMAGE

                      echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
                      docker compose pull client
                      docker compose up -d --pull always --force-recreate --no-deps client
                      docker compose restart nginx
                      docker image prune -f
